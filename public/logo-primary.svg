<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120" width="360" height="240">
  <!-- Icon Mark: Green rounded square -->
  <rect x="14" y="38" width="44" height="44" rx="10" fill="#4A7C59"/>
  <!-- White arc (curves UP) -->
  <path d="M22 60 Q36 46 50 60" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <!-- Sage arc (curves DOWN) -->
  <path d="M22 60 Q36 74 50 60" fill="none" stroke="#A8D4B5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- White dot (inside upper arc) -->
  <circle cx="36" cy="53" r="3" fill="#FFFFFF"/>
  <!-- Sage dot (inside lower arc) -->
  <circle cx="36" cy="67" r="3" fill="#A8D4B5"/>
  <!-- Wordmark: stacked -->
  <text x="68" y="53" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1A2E1F" letter-spacing="-0.3">renew</text>
  <text x="68" y="72" font-family="Arial, sans-serif" font-size="17" font-weight="300" fill="#4A7C59" letter-spacing="-0.3">shine</text>
  <!-- Thin rule -->
  <line x1="68" y1="80" x2="156" y2="80" stroke="#4A7C59" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Subtitle -->
  <text x="68" y="92" font-family="Arial, sans-serif" font-size="7.5" font-weight="400" fill="#4A7C59" letter-spacing="2">PREMIUM CLEANING</text>
</svg>
